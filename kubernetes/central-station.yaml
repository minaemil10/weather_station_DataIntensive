apiVersion: v1
kind: PersistentVolume
metadata:
  name: parquet-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/parquet-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: parquet-pvc
  namespace: weather-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-server
  namespace: weather-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: central-server
  template:
    metadata:
      labels:
        app: central-server
    spec:
      containers:

        # Container 1: Parquet Writer
        - name: consumer
          image: to-parquet:1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
          volumeMounts:
            - name: storage
              mountPath: /data/parquet

        # Container 2: BitCask / Central Station
        - name: bitcask
          image: central-station:1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: DATA_DIR
              value: "/data/bitcask"
          volumeMounts:
            - name: storage
              mountPath: /data/bitcask

      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: parquet-pvc