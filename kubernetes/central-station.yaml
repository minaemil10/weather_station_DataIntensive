apiVersion: v1
kind: PersistentVolume
metadata:
  name: parquet-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/parquet-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: parquet-pvc
  namespace: weather-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-server
  namespace: weather-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: central-server
  template:
    metadata:
      labels:
        app: central-server
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox
          command: ['sh', '-c', 'until nc -z kafka.weather-system.svc.cluster.local 9092; do echo waiting for kafka; sleep 3; done']
      containers:
        - name: consumer
          image: to-parquet:1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.weather-system.svc.cluster.local:9092"
            - name: OUTPUT_DIR
              value: "/data/pq"
          volumeMounts:
            - name: storage
              mountPath: /data/pq
        - name: bitcask
          image: central-station:1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.weather-system.svc.cluster.local:9092"
            - name: KAFKA_BROKERS
              value: "kafka.weather-system.svc.cluster.local:9092"
            - name: DATA_DIR
              value: "/data/bc"
          volumeMounts:
            - name: storage
              mountPath: /data/bc
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: parquet-pvc