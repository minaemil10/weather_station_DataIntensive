apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: parquet-pvc
  namespace: weather-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: parquet-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/parquet-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  # Updated name to reflect that this pod now handles both tasks
  name: central-server 
  namespace: weather-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: central-server
  template:
    metadata:
      labels:
        app: central-server
    spec:
      containers:
        # Container 1: The Parquet Writer
        - name: consumer
          image: to-parquet:1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              # Note: I swapped this back to the hardcoded IP from our earlier Minikube DNS fix!
              # Change it back to "kafka:9092" only if your DNS is currently working.
              value: "10.96.12.34:9092" 
          volumeMounts:
            - name: storage
              mountPath: /data/parquet

        # Container 2: The BitCask Store
        - name: bitcask
          # Replace this with the actual name of your BitCask Docker image
          image: your-bitcask-image:latest 
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "10.96.12.34:9092"
          volumeMounts:
            - name: storage
              mountPath: /data/bitcask

      # The volume is defined once at the Pod level
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: parquet-pvc