apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-station
  namespace: weather-system
spec:
  # Spools up the 10 required instances
  replicas: 10
  selector:
    matchLabels:
      app: weather-station
  template:
    metadata:
      labels:
        app: weather-station
    spec:
      containers:
        - name: weather-station
          image: weather-station:v3
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              # THE CRITICAL FIX: Using the FQDN to ensure DNS resolves
              value: "10.96.12.34:9092"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"